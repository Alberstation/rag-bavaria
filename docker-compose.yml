# Solo para pruebas en local. Railway NO usa este archivo.
#   docker compose up --build
# Luego abre http://localhost:3000
services:
  open-webui:
    build: .
    ports:
      - "3000:8080"
    env_file:
      - .env
    volumes:
      - openwebui-data:/app/backend/data
    restart: unless-stopped

volumes:
  openwebui-data:
